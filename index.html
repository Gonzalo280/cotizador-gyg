<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GyG Impresores · Cotizador</title>
<style>
  :root{
    --ink:#161A20; --ink-soft:#3A434F; --line:#D9DEE6; --line-soft:#E9EDF2;
    --paper:#F1F4F8; --card:#FFFFFF; --accent:#0E6E63; --accent-d:#0A554C;
    --warn:#B23A2E; --warn-bg:#FBECEA; --ok:#1F7A4D;
    --c:#00AEEF; --m:#EC008C; --y:#FFF200; --k:#161A20;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
  .cmyk{height:5px;display:flex}
  .cmyk i{flex:1}
  .cmyk i:nth-child(1){background:var(--c)}.cmyk i:nth-child(2){background:var(--m)}
  .cmyk i:nth-child(3){background:var(--y)}.cmyk i:nth-child(4){background:var(--k)}
  header.bar{background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand b{font-size:17px;letter-spacing:.5px}
  .brand span{font-size:11px;color:#9AA6B4;text-transform:uppercase;letter-spacing:2px;font-family:var(--mono)}
  .rolewrap{display:flex;align-items:center;gap:8px;font-size:12px;color:#9AA6B4}
  .toggle{display:flex;background:#262C36;border-radius:8px;padding:3px}
  .toggle button{background:none;border:0;color:#9AA6B4;font:inherit;font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer}
  .toggle button.on{background:var(--accent);color:#fff;font-weight:600}
  main{max-width:1080px;margin:0 auto;padding:18px;display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
  @media(max-width:860px){main{grid-template-columns:1fr;padding:14px}}
  .col-build{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card>h2{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-soft);font-family:var(--mono);padding:13px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:8px}
  .card>h2 .n{background:var(--ink);color:#fff;width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:11px}
  .body{padding:16px}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  input,select,textarea{width:100%;font:inherit;font-size:15px;padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  textarea{resize:vertical;min-height:54px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  .hint{font-size:11px;margin-top:4px;font-family:var(--mono)}
  .hint.err{color:var(--warn)}.hint.good{color:var(--ok)}
  .addrow{display:flex;gap:10px}
  .addrow select{flex:1}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:8px;font:inherit;font-weight:600;font-size:14px;padding:11px 16px;cursor:pointer;white-space:nowrap}
  .btn:hover{background:var(--accent-d)}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn.block{width:100%;padding:14px;font-size:15px}
  .item{border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:12px;position:relative}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .item .pname{font-weight:700;font-size:15px}
  .item .pmeta{font-size:11px;color:var(--ink-soft);font-family:var(--mono)}
  .x{background:none;border:0;color:var(--ink-soft);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
  .x:hover{color:var(--warn)}
  .switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;user-select:none}
  .switch input{width:auto;margin:0}
  .terms{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .terms .t{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
  .terms .t input[type=checkbox]{width:auto}
  .terms .t .price{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .terms .t input.qty{width:62px;padding:5px 7px;font-size:13px}
  .linefoot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:10px;border-top:1px solid var(--line-soft)}
  .linefoot .sub{font-family:var(--mono);font-weight:700;font-size:16px}
  .linefoot .mg{font-family:var(--mono);font-size:12px}
  .empty{color:var(--ink-soft);font-size:14px;text-align:center;padding:18px 0}
  /* summary */
  .col-sum{position:sticky;top:78px}
  @media(max-width:860px){.col-sum{position:static}}
  .sum{background:var(--ink);color:#fff;border-radius:12px;overflow:hidden}
  .sum .cot{font-family:var(--mono);font-size:13px;color:#9AA6B4;padding:13px 16px;border-bottom:1px solid #2A313B;letter-spacing:1px}
  .sum .rows{padding:14px 16px}
  .srow{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;font-family:var(--mono)}
  .srow.muted{color:#9AA6B4}
  .srow.total{font-size:21px;font-weight:700;border-top:1px solid #2A313B;margin-top:6px;padding-top:12px}
  .discount{padding:14px 16px;border-top:1px solid #2A313B}
  .discount label{color:#9AA6B4}
  .discount .di{display:flex;align-items:center;gap:8px}
  .discount input{width:90px;background:#262C36;border-color:#3A434F;color:#fff}
  .margin-box{margin:0 16px 14px;border-radius:9px;padding:11px 13px;font-family:var(--mono);font-size:13px}
  .margin-box.ok{background:#143A2B;color:#7EE0A8}
  .margin-box.bad{background:#3A1714;color:#F0A79C}
  .sum .act{padding:0 16px 16px}
  .note{font-size:11px;color:#7F8B99;padding:0 16px 14px;font-family:var(--mono);line-height:1.5}
  /* print */
  #print{display:none}
  @media print{
    body{background:#fff}
    header.bar,main{display:none!important}
    /* A5: los modales abiertos NO deben salir en el PDF */
    #hist,#otList,#otModal,#pagoModal,#login{display:none!important}
    #print{display:block;padding:0}
    .cmyk{height:6px}
    .p-wrap{padding:28px 34px;font-size:13px;color:#000}
    .p-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #161A20;padding-bottom:14px;margin-bottom:18px}
    .p-head .co b{font-size:20px;letter-spacing:.5px}
    .p-head .co span{display:block;font-size:11px;color:#444}
    .p-head .meta{text-align:right;font-family:var(--mono);font-size:12px}
    .p-head .meta b{font-size:15px}
    .p-sec{margin-bottom:16px}
    .p-sec h4{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#666;margin-bottom:6px;border-bottom:1px solid #ddd;padding-bottom:3px}
    table.p-items{width:100%;border-collapse:collapse;font-size:12px}
    table.p-items th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;border-bottom:1px solid #161A20;padding:6px 4px}
    table.p-items td{padding:7px 4px;border-bottom:1px solid #eee;vertical-align:top}
    table.p-items td.num,table.p-items th.num{text-align:right;font-family:var(--mono)}
    .p-tot{margin-left:auto;width:50%;margin-top:14px}
    .p-tot .r{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;padding:4px 0}
    .p-tot .r.total{font-size:17px;font-weight:700;border-top:2px solid #161A20;margin-top:5px;padding-top:8px}
    .p-foot{margin-top:26px;font-size:11px;color:#444;border-top:1px solid #ddd;padding-top:10px}
    .p-pago{margin-top:14px;border:1px solid #161A20;padding:8px 10px;font-size:11px}
    .p-pago-t{font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:10px;margin-bottom:3px}
    .p-contacto{margin-top:12px;display:flex;justify-content:space-between;align-items:flex-end;font-size:11px;color:#333;border-top:1px solid #ddd;padding-top:8px}
    /* OT en media hoja de oficio: dos por hoja, línea de corte al medio */
    .ot-copy{height:152mm;overflow:hidden;padding:6mm 8mm;box-sizing:border-box;page-break-inside:avoid}
    .ot-copy .p-wrap{padding:4px 6px;font-size:11px}
    .ot-copy .p-head{padding-bottom:6px;margin-bottom:8px}
    .ot-copy .p-head .co b{font-size:15px}
    .ot-copy .p-head .meta{font-size:10px}
    .ot-copy .p-head .meta b{font-size:13px}
    .ot-copy .p-sec{margin-bottom:8px}
    .ot-copy .p-sec h4{margin-bottom:3px;letter-spacing:1px}
    .ot-copy table.p-items{font-size:10px}
    .ot-copy table.p-items td{padding:3px 4px}
    .ot-copy table.p-items th{padding:3px 4px}
    .ot-copy .p-tot{margin-top:6px;width:55%}
    .ot-copy .p-tot .r{font-size:11px;padding:2px 0}
    .ot-copy .p-tot .r.total{font-size:13px;padding-top:4px;margin-top:2px}
    .ot-copy .p-foot{margin-top:8px;font-size:9px;padding-top:6px}
    .ot-cut{border-top:1.5px dashed #999;height:0;margin:2mm 0;position:relative}
    .ot-cut::after{content:"cortar aqui";position:absolute;right:4mm;top:-9px;font-size:8px;color:#999;background:#fff;padding:0 4px}
  }
  /* login */
  #login{position:fixed;inset:0;background:var(--ink);display:grid;place-items:center;z-index:100}
  .login-card{background:var(--card);border-radius:14px;padding:30px 28px;width:min(380px,92vw)}
  .login-card h1{font-size:18px;margin-bottom:2px}
  .login-card .sub{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);margin-bottom:18px}
  .login-card .field{margin-bottom:12px}
  #loginErr{color:var(--warn);font-size:13px;margin-top:10px;min-height:18px}
  .userchip{display:flex;align-items:center;gap:10px;font-size:12px;color:#9AA6B4}
  .userchip .pill{background:#262C36;border-radius:6px;padding:5px 10px;font-family:var(--mono);font-size:11px}
  .userchip .pill b{color:#fff}
  .userchip button{background:none;border:1px solid #3A434F;color:#9AA6B4;border-radius:6px;font:inherit;font-size:12px;padding:5px 10px;cursor:pointer}
  .userchip button:hover{color:#fff;border-color:#9AA6B4}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="bar">
  <div class="brand"><b>GyG IMPRESORES</b><span>Cotizador en terreno</span></div>
  <div class="userchip" id="userchip" style="display:none">
    <span class="pill" id="userInfo"></span>
    <button onclick="verHistorial()">Historial</button>
    <button onclick="verOTs()">Órdenes de trabajo</button>
    <button onclick="salir()">Salir</button>
  </div>
</header>
<div class="cmyk"><i></i><i></i><i></i><i></i></div>

<!-- PANTALLA DE INICIO DE SESIÓN -->
<div id="login">
  <div class="login-card">
    <h1>GyG Impresores</h1>
    <div class="sub">Cotizador · Iniciar sesión</div>
    <div class="field"><label>Correo</label><input id="loginEmail" type="email" autocomplete="username" placeholder="tu@correo.cl"></div>
    <div class="field"><label>Contraseña</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()"></div>
    <button class="btn block" onclick="entrar()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="hist" style="display:none;position:fixed;inset:0;background:rgba(22,26,32,.85);z-index:90;padding:20px;overflow:auto" onclick="if(event.target===this)cerrarHistorial()">
  <div style="max-width:720px;margin:30px auto;background:var(--card);border-radius:12px;overflow:hidden">
    <h2 style="font-size:12px;text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);padding:14px 18px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center">
      Historial de cotizaciones
      <button class="x" onclick="cerrarHistorial()">×</button>
    </h2>
    <div style="padding:0 18px 8px"><input id="histBuscar" placeholder="Buscar por N° o cliente…" oninput="filtrarHist()" style="width:100%"></div>
    <div id="histBody" style="padding:8px 18px 18px"></div>
  </div>
</div>

<main>
  <div class="col-build">
    <!-- CLIENTE -->
    <section class="card">
      <h2><span class="n">1</span> Cliente</h2>
      <div class="body">
        <div class="field" style="position:relative"><label>Cliente</label>
          <input id="cliBuscar" autocomplete="off" placeholder="Escribe para buscar… (o deja vacío para cliente nuevo)"
                 oninput="filtrarClientes()" onfocus="filtrarClientes()">
          <div id="cliLista" style="display:none;position:absolute;z-index:60;left:0;right:0;top:100%;max-height:280px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.35)"></div>
          <div id="cliHint" class="hint"></div>
        </div>
        <div class="field"><label>Razón social</label><input id="razon" autocomplete="off" placeholder="Empresa S.A." oninput="clienteSelId=null; render()"></div>
        <div class="grid2">
          <div class="field"><label>Nombre contacto</label><input id="contacto" autocomplete="off" oninput="render()"></div>
          <div class="field"><label>RUT (razón social a facturar)</label><input id="rut" autocomplete="off" placeholder="76.123.456-7" oninput="clienteSelId=null; onRut()"><div id="rutHint" class="hint"></div></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Teléfono</label><input id="tel" autocomplete="off" placeholder="+56 9 ..."></div>
          <div class="field"><label>Correo</label><input id="correo" autocomplete="off" type="email" placeholder="cliente@correo.cl"></div>
        </div>
        <div class="field"><label>Dirección</label><input id="dir" autocomplete="off" placeholder="Dirección de despacho"></div>
        <div class="field"><label>Observaciones del cliente</label><textarea id="obsCli"></textarea></div>
      </div>
    </section>

    <!-- PRODUCTOS -->
    <section class="card">
      <h2><span class="n">2</span> Productos</h2>
      <div class="body">
        <div class="addrow">
          <select id="prodSel">
            <option value="">Seleccionar producto…</option>
          </select>
          <button class="btn" onclick="addItem()">Agregar</button>
        </div>
        <div id="items"></div>
      </div>
    </section>

    <!-- COTIZACION -->
    <section class="card">
      <h2><span class="n">3</span> Detalles de la cotización</h2>
      <div class="body">
        <div class="grid2">
          <div class="field"><label>Vigencia (días)</label><input id="vig" type="number" value="15" min="1"></div>
          <div class="field"><label>Despacho</label><input id="despacho" placeholder="1 punto en Santiago"></div>
        </div>
        <div class="field"><label>Observaciones de la cotización</label><textarea id="obsCot" placeholder="Plazo de entrega, condiciones de pago…"></textarea></div>
      </div>
    </section>
  </div>

  <!-- RESUMEN -->
  <div class="col-sum">
    <div class="sum">
      <div class="cot" id="cotNum">COT · se asigna al guardar</div>
      <div class="rows" id="sumRows"></div>
      <div class="discount">
        <label>Descuento (%) <span id="discCap"></span></label>
        <div class="di"><input id="disc" type="number" value="0" min="0" oninput="refreshSummary()"> <span style="font-family:var(--mono);font-size:13px" id="discMonto"></span></div>
      </div>
      <div id="marginBox"></div>
      <div class="act"><button class="btn block" id="btnGuardar" onclick="guardar()">Guardar y generar PDF</button></div>
      <div class="act" style="margin-top:6px"><button class="btn block" id="btnGuardarOT" onclick="guardarYGenerarOT()" style="background:var(--accent-d)">Guardar y generar OT</button></div>
      <div class="note" id="footNote"></div>
    </div>
  </div>
</main>


<!-- Modal generar OT -->
<div id="otModal" style="display:none;position:fixed;inset:0;background:rgba(22,26,32,.85);z-index:95;padding:20px;overflow:auto" onclick="if(event.target===this)cerrarOtModal()">
  <div style="max-width:520px;margin:4vh auto;background:var(--card);border-radius:10px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);font-weight:600">
      Generar orden de trabajo <span id="otModalCot" style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)"></span>
      <button class="x" onclick="cerrarOtModal()">×</button>
    </div>
    <div style="padding:16px 18px">
      <div id="otYaExiste" style="display:none;text-align:center;padding:10px 0">
        <div style="color:var(--warn);font-weight:600;margin-bottom:10px" id="otYaExisteTxt"></div>
        <button class="btn" id="btnOtImprimir">Imprimir esa OT</button>
      </div>
      <div id="otFormulario">
      <div class="grid2">
        <div class="field"><label>Canal de venta *</label><select id="otCanal"></select></div>
        <div class="field"><label>Comprobante</label><select id="otComp"><option>Factura</option><option>Boleta</option><option>No aplica</option></select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Fecha de entrega</label><input id="otFecha" type="date"></div>
        <div class="field"><label>Hora de entrega</label><input id="otHora" type="time"></div>
      </div>
      <div class="field"><label>Pago inicial</label>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <button type="button" onclick="setAbono(0.5)">Abono 50%</button>
          <button type="button" onclick="setAbono(0.6)">Abono 60%</button>
          <button type="button" onclick="setAbono(1)">Pago total</button>
          <button type="button" onclick="setAbono(0)">Sin pago</button>
        </div>
        <div class="grid2">
          <input id="otAbono" type="number" min="0" placeholder="Monto $">
          <select id="otMedio"><option value="">Medio de pago…</option><option>Efectivo</option><option>Transferencia</option><option>Débito/Crédito</option></select>
        </div>
        <div class="hint" id="otAbonoHint"></div>
      </div>
      <div class="field"><label>Observaciones de producción</label><textarea id="otObs" placeholder="Indicaciones para taller, instalación, despacho…"></textarea></div>
      <div id="otErr" style="color:var(--warn);font-size:13px;margin-bottom:8px"></div>
      <button class="btn block" id="btnOtGen" onclick="confirmarOT()">Generar OT e imprimir</button>
      </div><!-- /otFormulario -->
    </div>
  </div>
</div>

<!-- Modal lista de OTs -->
<div id="otList" style="display:none;position:fixed;inset:0;background:rgba(22,26,32,.85);z-index:90;padding:20px;overflow:auto" onclick="if(event.target===this)cerrarOTs()">
  <div style="max-width:1000px;margin:3vh auto;background:var(--card);border-radius:10px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);font-weight:600">
      Órdenes de trabajo
      <button class="x" onclick="cerrarOTs()">×</button>
    </div>
    <div style="padding:0 18px 8px"><input id="otBuscar" placeholder="Buscar por N° de OT o cliente…" oninput="filtrarOTs()" style="width:100%"></div>
    <div id="otListBody" style="padding:8px 18px 18px"></div>
  </div>
</div>

<!-- A7 · Modal de pagos (reemplaza los prompt del navegador) -->
<div id="pagoModal" style="display:none;position:fixed;inset:0;background:rgba(22,26,32,.85);z-index:96;padding:20px;overflow:auto" onclick="if(event.target===this)cerrarPagoModal()">
  <div style="max-width:520px;margin:5vh auto;background:var(--card);border-radius:10px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);font-weight:600">
      Pagos <span id="pagoTitulo" style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)"></span>
      <button class="x" onclick="cerrarPagoModal()">×</button>
    </div>
    <div style="padding:16px 18px">
      <div id="pagoBody"></div>
      <div id="pagoForm" style="margin-top:14px;border-top:1px solid var(--line-soft);padding-top:12px">
        <div class="field"><label>Registrar nuevo pago</label>
          <div style="display:flex;gap:6px;margin-bottom:6px">
            <button type="button" onclick="setPagoTotal()">Pagar saldo total</button>
          </div>
          <div class="grid2">
            <input id="pagoMonto" type="number" min="0" placeholder="Monto $">
            <select id="pagoMedio">
              <option value="">Medio de pago…</option>
              <option>Efectivo</option>
              <option>Transferencia</option>
              <option>Débito/Crédito</option>
            </select>
          </div>

async function cargarCatalogo(){
  const [prods, precios, terms, pterms] = await Promise.all([
    sb.from("productos").select("id,nombre,material,metodo,permite_terminaciones,permite_diseno,orden,config").eq("activo", true),
    sb.from("producto_precios").select("producto_id,incluye_diseno,precio"),
    sb.from("terminaciones").select("id,nombre,precio,costo,tipo,dinamico,config"),
    sb.from("producto_terminaciones").select("producto_id,terminacion_id")
  ]);
  if(prods.error || precios.error || terms.error || pterms.error){
    alert("No se pudo cargar el catálogo. Revisa tu conexión a internet.");
    return;
  }
  // Costos: la base solo se los entrega al admin. Al vendedor ni siquiera le llegan.

  if(role === "admin"){
    costos = await sb.from("producto_costos").select("producto_id,incluye_diseno,costo");
    if(costos.error) costos = {data:[]};

  CATALOGO = {};
  prods.data.forEach(p=>{
    CATALOGO[p.id] = {nombre:p.nombre, material:p.material||"", metodo:p.metodo,
                      term:p.permite_terminaciones, permiteDiseno:p.permite_diseno!==false,
                      minimo:Number((p.config||{}).minimo)||0,   // V4: mínimo comercial por ítem
                      orden:(p.orden==null?9999:p.orden), termIds:[], precio:{con:0,sin:0}, costo:{con:0,sin:0}};
  });
  precios.data.forEach(r=>{ const c=CATALOGO[r.producto_id]; if(c) c.precio[r.incluye_diseno?"con":"sin"]=Number(r.precio); });
  (costos.data||[]).forEach(r=>{ const c=CATALOGO[r.producto_id]; if(c) c.costo[r.incluye_diseno?"con":"sin"]=Number(r.costo); });
  // Si un producto trae un solo precio (o costo), se usa para ambos modos (con/sin diseño)
  for(const k in CATALOGO){ const c=CATALOGO[k];
    if(!c.precio.sin && c.precio.con) c.precio.sin=c.precio.con;
    if(!c.precio.con && c.precio.sin) c.precio.con=c.precio.sin;
    if(!c.costo.sin  && c.costo.con)  c.costo.sin =c.costo.con;
    if(!c.costo.con  && c.costo.sin)  c.costo.con =c.costo.sin;
  }

  // Qué terminaciones ofrece cada producto (tabla de relación)
  (pterms.data||[]).forEach(r=>{ const c=CATALOGO[r.producto_id]; if(c) c.termIds.push(r.terminacion_id); });
  // Orden por id: las terminaciones existentes (id menor) primero, las nuevas después
  for(const k in CATALOGO){ CATALOGO[k].termIds.sort((a,b)=>a-b); }

  TERM = {};
  terms.data.forEach(t=>{
    TERM[t.id] = {nombre:t.nombre, precio:Number(t.precio), costo:Number(t.costo),
                  tipo:t.tipo, dinamico:t.dinamico, config:t.config||{}};
  });

  // Selector: primero por orden definido (1-19), el resto alfabético
  const sel=$("prodSel");
  sel.innerHTML = '<option value="">Seleccionar producto…</option>';
  Object.entries(CATALOGO)
    .sort((a,b)=> (a[1].orden - b[1].orden) || a[1].nombre.localeCompare(b[1].nombre, "es"))
    .forEach(([k,p])=>{ const o=document.createElement("option"); o.value=k; o.textContent=p.nombre; sel.appendChild(o); });
}

function validaRut(r){
  r = (r||"").replace(/[.\-\s]/g,"").toUpperCase();
  if(r.length<2) return false;
  const dv = r.slice(-1), num = r.slice(0,-1);
  if(!/^\d+$/.test(num)) return false;
  let s=1,m=0;
  for(let i=num.length-1;i>=0;i--){ s=(s+num[i]*(9-m++%6))%11; }
  const calc = s ? String(s-1) : "K";
  return calc === dv;
}
function onRut(){
  const v=$("rut").value.trim(); const h=$("rutHint");

/* ---------- MOTOR DE CÁLCULO ---------- */
function calcItem(it){
  const p=CATALOGO[it.key];
  const tier = it.diseno?"con":"sin";
  const area = p.metodo==="m2" ? dec(it.ancho)*dec(it.alto) : 1;
  let unitPrint = p.metodo==="m2" ? area*p.precio[tier] : p.precio[tier];
  // V4: mínimo comercial por producto (igual que el motor)
  if(p.metodo==="m2" && p.minimo>0 && unitPrint<p.minimo) unitPrint = p.minimo;
  let unitCostP = p.metodo==="m2" ? area*p.costo[tier]  : p.costo[tier];
  let termPrice=0, termCost=0;
  const anchoCm = (p.metodo==="m2" ? dec(it.ancho) : 0) * 100;
  if(p.term){
    (p.termIds||[]).forEach(t=>{
      const def=TERM[t]; if(!def) return;
      if(def.tipo==="fija" && it.terms[t]){
        const cfg = def.config||{};
        if(cfg.por_m2){
          // Laminado: por m² con mínimo. Precio = mayor(mínimo, área×precio); costo proporcional.
          termPrice += Math.max(Number(cfg.minimo)||0, area*def.precio);
          termCost  += area*def.costo;
        } else if(def.dinamico){
          const g=cfg;
          termPrice += def.precio;
          termCost  += (g.tubos||2)*anchoCm*(g.tubo_costo_cm||0) + (g.regatones||4)*(g.regaton||0);
        } else {
          termPrice += def.precio;
          termCost  += def.costo;
        }
      }
      if(def.tipo==="unidad"){ const q=Number(it.terms[t])||0; termPrice+=def.precio*q; termCost+=def.costo*q; }
    });
  }
  const cant=Number(it.cant)||0;
  const unitPrice=unitPrint+termPrice, unitCost=unitCostP+termCost;
  return {area, cant, unitPrice, unitCost, subtotal:unitPrice*cant, costoTotal:unitCost*cant};
}
function totals(){
  let netoBruto=0, costo=0;
  items.forEach(it=>{ const c=calcItem(it); netoBruto+=c.subtotal; costo+=c.costoTotal; });
  let d=Number($("disc").value)||0;
  if(role==="vendedor") d=Math.min(d,TOPE_VEND);
  const descMonto=netoBruto*d/100;
  const neto=netoBruto-descMonto;
  const iva=neto*IVA, total=neto+iva;
  const margenP = neto>0 ? (neto-costo)/neto*100 : 0;
  return {netoBruto,descMonto,neto,iva,total,costo,margenP,d};
}

    <div class="field"><label>Descripción corta (opcional, sale en cotización y OT)</label>
      <input type="text" maxlength="120" value="${(it.detalle||"").replace(/"/g,"&quot;")}" placeholder="Ej: EMPANADAS, SOPAIPILLAS…" oninput="updNum(${it.id},'detalle',this.value)"></div>`;
  }else{
    dims=`<div class="grid2">
      <div class="field"><label>Cantidad</label><input type="text" inputmode="numeric" value="${it.cant}" oninput="updNum(${it.id},'cant',this.value)"></div>
      <div></div>
    </div><div class="pmeta">Por unidad · Material: ${p.material}</div>
    <div class="field"><label>Descripción corta (opcional, sale en cotización y OT)</label>
      <input type="text" maxlength="120" value="${(it.detalle||"").replace(/"/g,"&quot;")}" placeholder="Ej: EMPANADAS, SOPAIPILLAS…" oninput="updNum(${it.id},'detalle',this.value)"></div>`;
  }
  let terms="";
  const tids = p.term ? (p.termIds||[]) : [];
  if(tids.length){
    terms=`<div class="terms">`;
    tids.forEach(t=>{
      const d=TERM[t]; if(!d) return;
      if(d.tipo==="fija"){
        const lbl = (d.config&&d.config.por_m2) ? `+${clp(d.precio)}/m²` : `+${clp(d.precio)}`;
        terms+=`<label class="t"><input type="checkbox" ${it.terms[t]?"checked":""} onchange="updTerm(${it.id},'${t}',this.checked)"> ${d.nombre} <span class="price">${lbl}</span></label>`;
      }else{
        terms+=`<div class="t"><span>${d.nombre}</span><input class="qty" type="text" inputmode="numeric" value="${it.terms[t]||0}" oninput="updTermNum(${it.id},'${t}',this.value)"><span class="price">${clp(d.precio)} c/u</span></div>`;
      }
    });
    terms+=`</div>`;
  }
  const mpct = c.subtotal>0 ? (c.subtotal-c.costoTotal)/c.subtotal*100 : 0;
  const mgInner = role==="admin" ? `margen ${mpct.toFixed(1)}%` : "";
  const mgColor = role==="admin" ? ((c.subtotal>0 && mpct<MARGEN_PISO)?"var(--warn)":"var(--ok)") : "";
  return `<div class="item">
    <div class="top">
      <div><div class="pname">${p.nombre}</div></div>
      <button class="x" onclick="rmItem(${it.id})" title="Quitar">×</button>
    </div>
    ${p.permiteDiseno ? `<label class="switch"><input type="checkbox" ${it.diseno?"checked":""} onchange="upd(${it.id},'diseno',this.checked)"> Incluye diseño <span style="font-weight:400;color:var(--ink-soft)">(${it.diseno?clp(p.precio.con):clp(p.precio.sin)}${p.metodo==="m2"?"/m²":"/u"})</span></label>` : ``}
    <div style="margin-top:10px">${dims}</div>
    ${terms}
    <div class="linefoot"><span class="sub" id="sub-${it.id}">${clp(c.subtotal)}</span><span class="mg" id="mg-${it.id}" style="color:${mgColor}">${mgInner}</span></div>
  </div>`;
}

function render(){
  $("cotNum").textContent = numeroActual || "COT · se asigna al guardar";
  $("items").innerHTML = items.length ? items.map(itemHTML).join("") : `<div class="empty">Sin productos. Agrega uno arriba.</div>`;
  $("footNote").innerHTML = role==="admin"
    ? "Costos y márgenes solo visibles para administrador. Bolsillo+tubo se costea por ancho (tubo + 4 regatones); no incluye mano de obra de armado."
    : "Correlativo, historial y envío por correo se activan al conectar la base de datos.";
  refreshSummary();
}

// Actualiza subtotales y márgenes por línea SIN recrear los inputs (no se pierde el foco al escribir)
function refreshTotals(){
  items.forEach(it=>{
    const c=calcItem(it);
    const s=document.getElementById("sub-"+it.id); if(s) s.textContent=clp(c.subtotal);
    const a=document.getElementById("area-"+it.id); if(a) a.textContent=c.area.toFixed(2);
    const m=document.getElementById("mg-"+it.id);
    if(m){
      if(role==="admin"){ const p=c.subtotal>0?(c.subtotal-c.costoTotal)/c.subtotal*100:0;
        m.style.color=(c.subtotal>0 && p<MARGEN_PISO)?"var(--warn)":"var(--ok)";
        m.textContent="margen "+p.toFixed(1)+"%";
      } else m.textContent="";
    }
  });
  refreshSummary();
}

function refreshSummary(){
  const t=totals();
  if(role==="vendedor"){
    $("disc").max=TOPE_VEND;
    if(Number($("disc").value)>TOPE_VEND) $("disc").value=TOPE_VEND;
    $("discCap").textContent="· tope vendedor "+TOPE_VEND+"%";
  }else{ $("disc").max=100; $("discCap").textContent="· admin sin tope"; }
  $("discMonto").textContent = t.descMonto>0 ? "− "+clp(t.descMonto) : "";

  $("sumRows").innerHTML =
    `<div class="srow muted"><span>Neto bruto</span><span>${clp(t.netoBruto)}</span></div>`+
    (t.descMonto>0?`<div class="srow muted"><span>Descuento ${t.d}%</span><span>− ${clp(t.descMonto)}</span></div>`:"")+
    `<div class="srow"><span>Neto</span><span>${clp(t.neto)}</span></div>`+
    `<div class="srow muted"><span>IVA 19%</span><span>${clp(t.iva)}</span></div>`+
    `<div class="srow total"><span>Total</span><span>${clp(t.total)}</span></div>`;

  const mb=$("marginBox");
  if(role==="admin"){
    const bad=t.neto>0 && t.margenP<MARGEN_PISO;
    mb.className="margin-box "+(bad?"bad":"ok");
    mb.innerHTML = `Costo total: ${clp(t.costo)} · Margen: ${t.margenP.toFixed(1)}%`+
      (bad?`<br>⚠ Bajo el piso de ${MARGEN_PISO}%. Revisa precio o descuento.`:"");
  }else{
    // El vendedor no recibe costos (RLS), así que no puede calcular margen.
    // La validación real del piso de margen se hará en el servidor al guardar.
    mb.className=""; mb.innerHTML="";
  }
}


/* ---------- GUARDAR EN LA BASE + PDF ---------- */
async function obtenerClienteId(){
  // Si eligió un cliente del desplegable y no editó razón social ni RUT, lo reutiliza
  if(clienteSelId) return clienteSelId;
  const rut = $("rut").value.trim();
  // Si hay RUT y el cliente ya existe (entre los que puedes ver), lo reutiliza
  if(rut){
    const {data} = await sb.from("clientes").select("id").eq("rut", rut).limit(1);
    if(data && data.length) return data[0].id;
  }
  const {data, error} = await sb.from("clientes").insert({
    razon_social:    $("razon").value.trim(),
    nombre_contacto: $("contacto").value.trim() || null,
    rut:             rut || null,
    telefono:        $("tel").value.trim() || null,
    correo:          $("correo").value.trim() || null,
    direccion:       $("dir").value.trim() || null,
    observaciones:   $("obsCli").value.trim() || null
  }).select("id").single();
  if(error) throw new Error("No se pudo guardar el cliente: " + error.message);
  return data.id;
}

async function guardar(){
  if(!items.length){ alert("Agrega al menos un producto."); return; }
  if(!$("razon").value.trim()){ alert("Falta la razón social del cliente."); return; }
  const btn = $("btnGuardar");
  btn.disabled = true; btn.textContent = "Guardando…";
  try{
    const cliente_id = await obtenerClienteId();
    const payload = {
      cliente_id,
      descuento_pct: Number($("disc").value) || 0,
      vigencia_dias: Number($("vig").value) || 15,
      observaciones: [
        $("despacho").value.trim() ? "Despacho: " + $("despacho").value.trim() : "",
        $("obsCot").value.trim()
      ].filter(Boolean).join(" · ") || null,
      items: items.map(it=>{
        const p = CATALOGO[it.key];
        const terms = [];
        if(p.term){
          (p.termIds||[]).forEach(k=>{
            const d = TERM[k]; if(!d) return;
            if(d.tipo === "fija"   && it.terms[k]) terms.push({id:Number(k), cantidad:1});
            if(d.tipo === "unidad" && (Number(it.terms[k])||0) > 0) terms.push({id:Number(k), cantidad:Number(it.terms[k])});
          });
        }
        return { producto_id: Number(it.key), incluye_diseno: !!it.diseno,
                 ancho: dec(it.ancho), alto: dec(it.alto),
                 cantidad: Number(it.cant)||1, terminaciones: terms,
                 detalle: (it.detalle||"").trim() };
      })
    };
    // La base recalcula, valida tope de descuento y piso de margen, y asigna el correlativo
    const {data, error} = await sb.rpc("guardar_cotizacion", {p: payload});
    if(error) throw new Error(error.message);
    numeroActual = data.numero;
    $("cotNum").textContent = numeroActual;
    imprimir();
    numeroActual = null;   // la próxima cotización recibirá su propio número
    await cargarClientes(); // refresca el desplegable por si fue un cliente nuevo
    limpiarFormulario();   // B6: vuelve todo a 0 para la siguiente cotización
  }catch(e){
    alert("No se pudo guardar: " + (e.message || e));
  }finally{
    btn.disabled = false; btn.textContent = "Guardar y generar PDF";
  }
}


/* B6 — Limpiar todo el formulario tras guardar (deja el cotizador en 0) */
function limpiarFormulario(){
  items = [];
  clienteSelId = null;
  ["cliBuscar","razon","contacto","rut","tel","correo","dir","obsCliente",
   "despacho","obsCot"].forEach(id=>{ const el=$(id); if(el) el.value=""; });
  const disc=$("disc"); if(disc) disc.value = 0;      // descuento vuelve a 0
  const vig=$("vig");   if(vig)  vig.value  = 15;
  const rh=$("rutHint"); if(rh) rh.textContent="";
  const cl=$("cliLista"); if(cl) cl.style.display="none";
  render();
}

/* ---------- HISTORIAL ---------- */
let HIST_CACHE = [];
async function verHistorial(){
  $("hist").style.display = "block";
  $("histBuscar").value = "";
  $("histBody").innerHTML = '<div class="empty">Cargando…</div>';
  const [{data, error}, ots] = await Promise.all([
    sb.from("cotizaciones")
      .select("numero, fecha, estado, total, clientes(razon_social)")
      .order("id", {ascending:false}).limit(200),
    sb.from("v_ot_resumen").select("numero, cotizacion_numero")
  ]);
  if(error){ $("histBody").innerHTML = '<div class="empty">No se pudo cargar el historial.</div>'; return; }
  if(!data.length){ $("histBody").innerHTML = '<div class="empty">Aún no hay cotizaciones guardadas.</div>'; return; }
  // Mapa cotización → OT (la vista sí trae las OT; el embed anidado no funcionaba)
  const otMap = {};
  (ots.data||[]).forEach(o=>{ otMap[o.cotizacion_numero] = o.numero; });
  data.forEach(c=>{ c.ot_numero = otMap[c.numero] || null; });
  HIST_CACHE = data;
  pintarHist(data);
}
function filtrarHist(){
  const q = $("histBuscar").value.toLowerCase().trim();
  const f = !q ? HIST_CACHE : HIST_CACHE.filter(c =>
    (c.numero||"").toLowerCase().includes(q) ||
    (c.clientes && c.clientes.razon_social || "").toLowerCase().includes(q));
  pintarHist(f);
}
function pintarHist(data){
  if(!data.length){ $("histBody").innerHTML = '<div class="empty">Sin coincidencias.</div>'; return; }
  $("histBody").innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr>'+
      '<th style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">N°</th>'+
      '<th style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">Fecha</th>'+
      '<th style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">Cliente</th>'+
      '<th style="text-align:right;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">Total</th>'+
      '<th style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">Estado</th>'+
      '<th style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase">OT</th>'+
    '</tr></thead><tbody>'+
    data.map(c=>'<tr>'+
      '<td style="padding:8px 4px;border-bottom:1px solid var(--line-soft);font-family:var(--mono)">'+c.numero+'</td>'+
      '<td style="padding:8px 4px;border-bottom:1px solid var(--line-soft)">'+new Date(c.fecha+"T12:00:00").toLocaleDateString("es-CL")+'</td>'+
      '<td style="padding:8px 4px;border-bottom:1px solid var(--line-soft)">'+(c.clientes?c.clientes.razon_social:"—")+'</td>'+
      '<td style="padding:8px 4px;border-bottom:1px solid var(--line-soft);text-align:right;font-family:var(--mono)">'+clp(c.total)+'</td>'+

          : '<button onclick="abrirOtModal(\''+c.numero+'\','+c.total+')">Generar OT</button>')+

}
function cerrarHistorial(){ $("hist").style.display = "none"; }

  const rows=items.map(it=>{
    const p=CATALOGO[it.key], c=calcItem(it);
    let desc=p.nombre;   // A8: sin sufijo de diseño
    if((it.detalle||"").trim()) desc += " · " + it.detalle.trim();   // V4: descripción corta
    if(p.metodo==="m2") desc+=` · ${it.ancho}×${it.alto} m (${c.area.toFixed(2)} m²)`;
    const tl=[]; if(p.term){ (p.termIds||[]).forEach(k=>{ const d=TERM[k]; if(!d) return; if(d.tipo==="fija"&&it.terms[k])tl.push(d.nombre); if(d.tipo==="unidad"&&Number(it.terms[k])>0)tl.push(`${it.terms[k]} ${d.nombre}`);}); }
    if(tl.length) desc+=" · "+tl.join(", ");
    return `<tr><td>${desc}</td><td class="num">${c.cant}</td><td class="num">${clp(c.unitPrice)}</td><td class="num">${clp(c.subtotal)}</td></tr>`;
  }).join("");

  $("print").innerHTML=`
    <div class="cmyk"><i></i><i></i><i></i><i></i></div>
    <div class="p-wrap">
      <div class="p-head">
        <div class="co"><b>GyG IMPRESORES</b>
          <span>Soluciones gráficas y publicidad visual</span>
          <span>${EMPRESA.membrete}</span>
        </div>
        <div class="meta"><b>${numeroActual}</b><br>Fecha: ${fecha}<br>Vigencia: ${$("vig").value||15} días<br>
          Vendedor: ${(perfil&&perfil.nombre)||"—"}</div>
      </div>
      <div class="p-sec"><h4>Cliente</h4>
        <b>${$("razon").value||"—"}</b><br>
        ${$("contacto").value?"Contacto: "+$("contacto").value+"<br>":""}
        ${$("rut").value?"RUT: "+$("rut").value+"<br>":""}
        ${$("tel").value?"Tel: "+$("tel").value+" · ":""}${$("correo").value||""}<br>
        ${$("dir").value?"Dirección: "+$("dir").value:""}
      </div>
      <div class="p-sec"><h4>Detalle</h4>
        <table class="p-items"><thead><tr><th>Descripción</th><th class="num">Cant.</th><th class="num">P. unit.</th><th class="num">Subtotal</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="p-tot">
        ${t.descMonto>0?`<div class="r"><span>Neto bruto</span><span>${clp(t.netoBruto)}</span></div><div class="r"><span>Descuento ${t.d}%</span><span>− ${clp(t.descMonto)}</span></div>`:""}
        <div class="r"><span>Neto</span><span>${clp(t.neto)}</span></div>
        <div class="r"><span>IVA 19%</span><span>${clp(t.iva)}</span></div>
        <div class="r total"><span>Total</span><span>${clp(t.total)}</span></div>
      </div>
      <div class="p-foot">
        ${$("despacho").value?"<b>Despacho:</b> "+$("despacho").value+"<br>":""}
        ${$("obsCot").value?"<b>Observaciones:</b> "+$("obsCot").value+"<br>":""}
      </div>
      <div class="p-pago">
        <div class="p-pago-t">Detalle para pagos · Banco Itaú</div>
        <div>${EMPRESA.titular} · RUT: ${EMPRESA.rut} · Cta. Corriente: ${EMPRESA.cuenta} · ${EMPRESA.correo}</div>
      </div>
      <div class="p-contacto">
        <div>
          <b>Información de contacto</b><br>
          Teléfono: ${EMPRESA.fono} · WhatsApp: ${EMPRESA.wsp}<br>
          Correo: ${EMPRESA.correo} · Instagram: ${EMPRESA.rrss}<br>
          ${EMPRESA.direccion} · A pasos Metro Biobío
        </div>
        <div style="text-align:right">
          <b>${(perfil&&perfil.nombre)||""}</b><br>

  // A2: nombre del archivo → GyG-COTI-2026-0066-SantaRosa.pdf

  cerrarHistorial(); cerrarOTs(); cerrarOtModal();

/* ---------- ÓRDENES DE TRABAJO ---------- */
let otCotNum = null, otCotTotal = 0, CANALES = [];

async function cargarCanales(){
  if(CANALES.length) return;
  const {data} = await sb.from("canales_venta").select("codigo,nombre").eq("activo",true).order("codigo");
  CANALES = data || [];
}

async function abrirOtModal(cotNumero, total){
  otCotNum = cotNumero; otCotTotal = Number(total)||0;
  await cargarCanales();
  $("otCanal").innerHTML = '<option value="">Seleccionar canal…</option>' +
    CANALES.map(c=>`<option value="${c.codigo}">${c.codigo} · ${c.nombre}</option>`).join("");
  $("otModalCot").textContent = cotNumero + " · " + clp(otCotTotal);
  $("otAbono").value = ""; $("otMedio").value = ""; $("otObs").value = "";
  $("otFecha").value = ""; $("otHora").value = ""; $("otErr").textContent = "";
  $("otAbonoHint").textContent = "Total de la cotización: " + clp(otCotTotal);

  // Pre-chequeo: si la cotización YA tiene OT, mostrar aviso en vez del formulario
  $("otYaExiste").style.display = "none";
  $("otFormulario").style.display = "block";
  const {data: otex} = await sb.from("v_ot_resumen")
    .select("numero").eq("cotizacion_numero", cotNumero).limit(1);
  if(otex && otex.length){
    const n = otex[0].numero;
    $("otYaExisteTxt").textContent = "Esta cotización ya tiene la OT " + n + ".";
    $("btnOtImprimir").onclick = ()=>{ cerrarOtModal(); imprimirOT(n); };
    $("otYaExiste").style.display = "block";
    $("otFormulario").style.display = "none";
  }
  $("otModal").style.display = "block";
}
function cerrarOtModal(){ $("otModal").style.display = "none"; otCotNum = null; }
function setAbono(f){ $("otAbono").value = Math.round(otCotTotal*f); }

async function confirmarOT(){
  const canal = $("otCanal").value;
  if(!canal){ $("otErr").textContent = "Elige el canal de venta."; return; }
  const abono = Number($("otAbono").value)||0;
  if(abono > otCotTotal){ $("otErr").textContent = "El abono supera el total."; return; }
  const btn = $("btnOtGen"); btn.disabled = true; btn.textContent = "Generando…";
  try{
    const {data, error} = await sb.rpc("generar_ot", {p:{
      cotizacion_numero: otCotNum, canal_codigo: Number(canal),
      fecha_entrega: $("otFecha").value || "", hora_entrega: $("otHora").value || "",
      comprobante: $("otComp").value, abono_monto: abono,
      abono_medio: $("otMedio").value, observaciones: $("otObs").value.trim()
    }});
    if(error) throw new Error(error.message);
    cerrarOtModal();
    await imprimirOT(data.numero);
  }catch(e){
    $("otErr").textContent = e.message || e;
  }finally{
    btn.disabled = false; btn.textContent = "Generar OT e imprimir";
  }
}

async function guardarYGenerarOT(){
  if(!items.length){ alert("Agrega al menos un producto."); return; }
  if(!$("razon").value.trim()){ alert("Falta la razón social del cliente."); return; }
  const btn = $("btnGuardarOT"); btn.disabled = true; btn.textContent = "Guardando…";
  try{
    const cliente_id = await obtenerClienteId();
    const payload = {
      cliente_id,
      descuento_pct: Number($("disc").value) || 0,
      vigencia_dias: Number($("vig").value) || 15,
      observaciones: [
        $("despacho").value.trim() ? "Despacho: " + $("despacho").value.trim() : "",
        $("obsCot").value.trim()
      ].filter(Boolean).join(" · ") || null,
      items: items.map(it=>{
        const p = CATALOGO[it.key];
        const terms = [];
        if(p.term){
          (p.termIds||[]).forEach(k=>{
            const d = TERM[k]; if(!d) return;
            if(d.tipo === "fija"   && it.terms[k]) terms.push({id:Number(k), cantidad:1});
            if(d.tipo === "unidad" && (Number(it.terms[k])||0) > 0) terms.push({id:Number(k), cantidad:Number(it.terms[k])});
          });
        }
        return { producto_id: Number(it.key), incluye_diseno: !!it.diseno,
                 ancho: dec(it.ancho), alto: dec(it.alto),
                 cantidad: Number(it.cant)||1, terminaciones: terms,
                 detalle: (it.detalle||"").trim() };
      })
    };
    const {data, error} = await sb.rpc("guardar_cotizacion", {p: payload});
    if(error) throw new Error(error.message);
    await cargarClientes();
    const t = totals();
    await abrirOtModal(data.numero, t.total);
    limpiarFormulario();   // B6: el modal ya tiene numero y total; el form queda listo
  }catch(e){
    alert("No se pudo guardar: " + (e.message || e));
  }finally{
    btn.disabled = false; btn.textContent = "Guardar y generar OT";
  }
}

let OT_CACHE = [];
async function verOTs(){
  $("otList").style.display = "block";
  $("otBuscar").value = "";
  $("otListBody").innerHTML = '<div class="empty">Cargando…</div>';
  const {data, error} = await sb.from("v_ot_resumen")
    .select("*").order("id", {ascending:false}).limit(200);
  if(error){ $("otListBody").innerHTML = '<div class="empty">No se pudo cargar. ¿Corriste el SQL de OT?</div>'; return; }
  if(!data.length){ $("otListBody").innerHTML = '<div class="empty">Aún no hay órdenes de trabajo.</div>'; return; }
  OT_CACHE = data;
  pintarOTs(data);
}
function filtrarOTs(){
  const q = $("otBuscar").value.toLowerCase().trim();
  const f = !q ? OT_CACHE : OT_CACHE.filter(o =>
    (o.numero||"").toString().toLowerCase().includes(q) ||
    (o.razon_social||"").toLowerCase().includes(q));
  pintarOTs(f);
}
function pintarOTs(data){
  if(!data.length){ $("otListBody").innerHTML = '<div class="empty">Sin coincidencias.</div>'; return; }
  // A9: estados reales del flujo (clave BD → etiqueta visible)
  const est = Object.entries(ESTADOS_OT);
  const th = 'style="text-align:left;padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;text-transform:uppercase"';
  const td = 'style="padding:8px 4px;border-bottom:1px solid var(--line-soft)"';
  $("otListBody").innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>'+
    `<th ${th}>N°</th><th ${th}>Cliente</th><th ${th}>Canal</th><th ${th}>Entrega</th>`+
    `<th ${th} style="text-align:right">Total</th><th ${th} style="text-align:right">Saldo</th>`+
    `<th ${th}>Estado</th><th ${th}></th>`+
    '</tr></thead><tbody>'+
    data.map(o=>{
      const ent = o.fecha_entrega ? new Date(o.fecha_entrega+"T12:00:00").toLocaleDateString("es-CL") : "—";
      const saldoCol = Number(o.saldo)>0 ? "var(--warn)" : "var(--ok)";
      return `<tr>
        <td ${td} style="font-family:var(--mono)">${o.numero}</td>
        <td ${td}>${o.razon_social||"—"}</td>
        <td ${td}>${o.canal}</td>
        <td ${td}>${ent}${o.hora_entrega?" "+String(o.hora_entrega).slice(0,5):""}</td>
        <td ${td} style="text-align:right;font-family:var(--mono)">${clp(o.total)}</td>
        <td ${td} style="text-align:right;font-family:var(--mono);color:${saldoCol}">${clp(o.saldo)}</td>
        <td ${td}><select onchange="cambiarEstadoOT('${o.numero}',this.value)" style="padding:4px 6px">${est.map(([k,lbl])=>`<option value="${k}" ${k===o.estado?"selected":""}>${lbl}</option>`).join("")}</select></td>
        <td ${td} style="white-space:nowrap">
          <button onclick="imprimirOT('${o.numero}')">Imprimir</button>
          <button onclick="abrirPagoModal('${o.numero}')">${Number(o.saldo)>0?"P. Pagar":"Cancelada"}</button>
        </td></tr>`;
    }).join("")+'</tbody></table>';
}
function cerrarOTs(){ $("otList").style.display = "none"; }

async function cambiarEstadoOT(numero, estado){
  const {error} = await sb.rpc("cambiar_estado_ot", {p:{ot_numero:numero, estado}});
  if(error){ alert("No se pudo cambiar el estado: "+error.message); verOTs(); }
}

/* ---------- A7 · PAGOS (modal propio; reemplaza los prompt() del navegador) ---------- */
let pagoOtNum = null, pagoSaldo = 0;

async function abrirPagoModal(numero){
  pagoOtNum = numero;
  $("pagoModal").style.display = "block";
  $("pagoErr").textContent = "";
  $("pagoOk").textContent  = "";
  $("pagoMonto").value = "";
  $("pagoMedio").value = "";
  $("pagoTitulo").textContent = "OT " + numero;
  $("pagoBody").innerHTML = '<div class="empty">Cargando…</div>';
  await refrescarPagos();
}
function cerrarPagoModal(){
  $("pagoModal").style.display = "none";
  pagoOtNum = null;
  verOTs();   // refresca la lista con el saldo actualizado
}

async function refrescarPagos(){
  const {data, error} = await sb.rpc("detalle_ot", {p:{ot_numero: pagoOtNum}});
  if(error || !data){ $("pagoBody").innerHTML = '<div class="empty">No se pudo cargar la OT.</div>'; return; }
  const d = data;
  pagoSaldo = Number(d.saldo)||0;
  const pagos = d.pagos || [];
  const esAdmin = (role === "admin");

  const filas = pagos.length
    ? pagos.map(p=>`<tr>
        <td style="padding:6px 4px;border-bottom:1px solid var(--line-soft);font-size:12px">${p.fecha}</td>
        <td style="padding:6px 4px;border-bottom:1px solid var(--line-soft);font-size:12px">${p.medio}</td>
        <td style="padding:6px 4px;border-bottom:1px solid var(--line-soft);text-align:right;font-family:var(--mono)">${clp(p.monto)}</td>
        <td style="padding:6px 4px;border-bottom:1px solid var(--line-soft);text-align:right">
          ${esAdmin?`<button onclick="anularPago(${p.id})" style="color:var(--warn)">Anular</button>`:""}
        </td></tr>`).join("")
    : '<tr><td colspan="4" style="padding:10px 4px;color:var(--ink-soft);font-size:13px">Sin pagos registrados.</td></tr>';

  $("pagoBody").innerHTML = `
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;margin-bottom:10px">
      <span>Total: <b>${clp(d.total)}</b>${d.sin_iva?' <span style="color:var(--warn);font-size:11px">(sin IVA · No aplica)</span>':""}</span>
      <span>Pagado: <b>${clp(d.pagado)}</b></span>
      <span style="color:${pagoSaldo>0?"var(--warn)":"var(--ok)"}">Saldo: <b>${clp(pagoSaldo)}</b></span>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);padding:4px">Fecha</th>
        <th style="text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);padding:4px">Medio</th>
        <th style="text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);padding:4px">Monto</th>
        <th></th>
      </tr></thead><tbody>${filas}</tbody>
    </table>`;

  // Si no hay saldo, se oculta el formulario de pago nuevo
  $("pagoForm").style.display = pagoSaldo > 0 ? "block" : "none";
  if(pagoSaldo > 0) $("pagoHint").textContent = "Saldo pendiente: " + clp(pagoSaldo);
}

function setPagoTotal(){ $("pagoMonto").value = Math.round(pagoSaldo); }

async function confirmarPago(){
  $("pagoErr").textContent = ""; $("pagoOk").textContent = "";
  const monto = Number($("pagoMonto").value)||0;
  if(monto <= 0){ $("pagoErr").textContent = "Ingresa un monto mayor a 0."; return; }
  if(monto > pagoSaldo){ $("pagoErr").textContent = "El monto supera el saldo (" + clp(pagoSaldo) + ")."; return; }
  const medio = $("pagoMedio").value;
  if(!medio){ $("pagoErr").textContent = "Selecciona el medio de pago."; return; }

  const btn = $("btnPago"); btn.disabled = true; btn.textContent = "Registrando…";
  const {error} = await sb.rpc("registrar_pago_ot", {p:{ot_numero: pagoOtNum, monto, medio}});
  btn.disabled = false; btn.textContent = "Registrar pago";
  if(error){ $("pagoErr").textContent = "No se pudo registrar: " + error.message; return; }
  $("pagoOk").textContent = "Pago de " + clp(monto) + " registrado.";
  $("pagoMonto").value = ""; $("pagoMedio").value = "";
  await refrescarPagos();
}

async function anularPago(pagoId){
  if(!confirm("¿Anular este pago? La acción queda registrada y el saldo vuelve a subir.")) return;
  const {error} = await sb.rpc("anular_pago_ot", {p:{pago_id: pagoId}});
  if(error){ $("pagoErr").textContent = "No se pudo anular: " + error.message; return; }
  $("pagoOk").textContent = "Pago anulado.";
  await refrescarPagos();
}

async function imprimirOT(numero){
  const {data, error} = await sb.rpc("detalle_ot", {p:{ot_numero:numero}});
  if(error || !data){ alert("No se pudo cargar la OT."); return; }
  const d = data;
  const rows = (d.items||[]).map(i=>{
    let desc = i.descripcion;
    if(i.m2) desc += ` · ${i.ancho}×${i.alto} m (${Number(i.m2).toFixed(2)} m²)`;
    // A8: sin sufijo de diseño (el diseño es un ítem propio del catálogo)
    const tl = (i.terminaciones||[]).map(t=> (t.cantidad>1? t.cantidad+" ":"") + (t.nombre||"")).filter(Boolean);
    if(tl.length) desc += " · " + tl.join(", ");
    return `<tr><td>${desc}</td><td class="num">${i.cantidad}</td><td class="num">${clp(i.subtotal)}</td></tr>`;
  }).join("");
  const otHTML = `
    <div class="ot-copy">
    <div class="cmyk"><i></i><i></i><i></i><i></i></div>
    <div class="p-wrap">
      <div class="p-head">
        <div class="co"><b>GyG IMPRESORES</b><span>Orden de Trabajo</span><span>Santiago de Chile</span></div>
        <div class="meta"><b>OT: ${d.numero}</b><br>Pedido: ${d.fecha_pedido}<br>
          <b>Entrega: ${d.fecha_entrega||"por definir"}${d.hora_entrega?" · "+d.hora_entrega:""}</b><br>
          Canal: ${d.canal} · ${d.comprobante}</div>
      </div>
      <div class="p-sec"><h4>Cliente</h4>
        <b>${d.cliente.razon_social||"—"}</b><br>
        ${d.cliente.rut?"RUT: "+d.cliente.rut+"<br>":""}
        ${d.cliente.contacto?"Contacto: "+d.cliente.contacto+"<br>":""}
        ${d.cliente.telefono?"Tel: "+d.cliente.telefono+" · ":""}${d.cliente.correo||""}<br>
        ${d.cliente.direccion?"Dirección: "+d.cliente.direccion:""}
      </div>
      <div class="p-sec"><h4>Detalle del pedido</h4>
        <table class="p-items"><thead><tr><th>Descripción</th><th class="num">Cant.</th><th class="num">Subtotal</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="p-tot">
        <div class="r"><span>Neto</span><span>${clp(d.neto)}</span></div>
        ${d.sin_iva ? "" : `<div class="r"><span>IVA 19%</span><span>${clp(d.iva)}</span></div>`}
        <div class="r total"><span>Total</span><span>${clp(d.total)}</span></div>
        <div class="r"><span>Cancelado</span><span>${clp(d.pagado)}</span></div>
        <div class="r total"><span>SALDO</span><span>${clp(d.saldo)}</span></div>
      </div>
      <div class="p-foot">
        ${d.observaciones?"<b>Observaciones:</b> "+d.observaciones+"<br>":""}
        Cotización de origen: ${d.cotizacion}${d.vendedor?" · Vendedor: "+d.vendedor:""}<br><br>
        Recibí conforme: ______________________________ &nbsp;&nbsp; Fecha: ____/____/______
      </div>
    </div>
    </div>`;
  $("print").innerHTML = otHTML + '<div class="ot-cut"></div>' + otHTML;
  // A5: cerrar cualquier modal abierto antes de imprimir (si no, salen en el PDF)
  cerrarHistorial(); cerrarOTs(); cerrarOtModal();
  // A2: nombre del archivo → GyG-OT-10012-SantaRosa.pdf
  // C1: fijar el título y dar 200ms antes de abrir el diálogo
  document.title = nombreArchivo("OT", d.numero, d.canal, d.cliente && d.cliente.razon_social);
  setTimeout(()=>{ window.print(); }, 200);
}


render();
</script>
</body>
</html>
